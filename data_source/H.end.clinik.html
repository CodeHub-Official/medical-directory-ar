<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN JOY VIP | التحفة السينمائية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --fuchsia: #FF006E;
            --orange: #FFBE0B;
            --violet: #8338EC;
            --bg: #030303;
        }

        body { 
            margin: 0; font-family: 'Cairo', sans-serif; 
            background: var(--bg); color: white; overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* ✨ تأثير الضوء التفاعلي خلف الموقع */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255, 0, 110, 0.15) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        /* هيدر زجاجي فخم */
        .glass-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 8%; background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 2000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo { font-size: 1.6rem; font-weight: 900; }
        .logo span { color: var(--fuchsia); text-shadow: 0 0 15px var(--fuchsia); }

        /* سكشن الهيرو - العنوان المعدني */
        .hero { padding: 80px 20px; text-align: center; }
        .hero h1 { 
            font-size: 3.2rem; font-weight: 900; margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff 0%, #888 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* برواز الـ Before & After (صور 1 و 2) */
        .ba-frame {
            position: relative; max-width: 500px; margin: 40px auto;
            padding: 12px; background: rgba(255,255,255,0.03);
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }
        .ba-container { 
            position: relative; width: 100%; aspect-ratio: 1/1; 
            border-radius: 30px; overflow: hidden; touch-action: none;
        }
        .ba-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; }
        .ba-after { background-image: url('2.jpg'); }
        .ba-before { 
            background-image: url('1.jpg'); 
            width: 50%; border-right: 3px solid var(--orange); z-index: 2;
        }
        .ba-slider { position: absolute; z-index: 10; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: col-resize; }

        /* معرض الجمال الزجاجي (صور 3 لـ 10) */
        .gallery { padding: 60px 8%; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .grid-item { 
            border-radius: 25px; overflow: hidden; height: 180px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.5s ease;
        }
        .grid-item:hover { transform: translateY(-10px); border-color: var(--fuchsia); }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* سكشن الخدمات (صور 11 لـ 14) */
        .services { padding: 40px 8%; background: rgba(255,255,255,0.01); }
        .serv-card { 
            display: flex; align-items: center; background: rgba(255,255,255,0.03);
            margin-bottom: 15px; border-radius: 25px; padding: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .serv-card img { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; }
        .serv-card h4 { margin: 0 15px; color: var(--orange); }

        /* زر الأكشن النيوني */
        .joy-btn { 
            background: linear-gradient(45deg, var(--fuchsia), var(--violet)); 
            border: none; padding: 22px 60px; color: white; font-size: 1.2rem; 
            border-radius: 100px; font-weight: 900; text-decoration: none; 
            display: inline-block; margin: 40px 0;
            box-shadow: 0 15px 40px rgba(255, 0, 110, 0.4);
        }

        /* سكشن العروض النهائي (صور 15 لـ 18) */
        .offers { padding: 40px 8%; text-align: center; }
        .offer-row { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 20px; scrollbar-width: none; }
        .offer-card { min-width: 200px; background: #111; border-radius: 25px; overflow: hidden; border-bottom: 3px solid var(--orange); }
        .offer-card img { width: 100%; height: 120px; object-fit: cover; }
        .offer-card p { padding: 10px; font-weight: bold; font-size: 0.9rem; }

        footer { padding: 60px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
        footer strong { color: var(--orange); }
    </style>
</head>
<body>

    <div class="bg-glow" id="glow"></div>

    <nav class="glass-nav">
        <div class="logo">TITAN<span>JOY</span></div>
        <div style="font-size: 0.7rem; font-weight: bold; color: var(--orange); letter-spacing: 2px;">BY CODEHUB</div>
    </nav>

    <header class="hero">
        <h1>الفخامة تليق <br><span>ببشرتِك</span></h1>
        
        <div class="ba-frame">
            <div class="ba-container">
                <div class="ba-after ba-img"></div>
                <div class="ba-before ba-img" id="before-img"></div>
                <input type="range" min="0" max="100" value="50" class="ba-slider" id="ba-range">
            </div>
        </div>
        <a href="https://wa.me/201234567890" class="joy-btn">احجزي مكانكِ الآن</a>
    </header>

    <section class="gallery">
        <div class="grid">
            <div class="grid-item"><img src="3.jpg"></div>
            <div class="grid-item"><img src="4.jpg"></div>
            <div class="grid-item"><img src="5.jpg"></div>
            <div class="grid-item"><img src="6.jpg"></div>
            <div class="grid-item"><img src="7.jpg"></div>
            <div class="grid-item"><img src="8.jpg"></div>
            <div class="grid-item"><img src="9.jpg"></div>
            <div class="grid-item"><img src="10.jpg"></div>
        </div>
    </section>

    <section class="services">
        <div class="serv-card"><img src="11.jpg"><h4>ليزر كانديلا</h4></div>
        <div class="serv-card"><img src="12.jpg"><h4>هيدرا بلس</h4></div>
        <div class="serv-card"><img src="13.jpg"><h4>ديرمابن</h4></div>
        <div class="serv-card"><img src="14.jpg"><h4>سكالبترا</h4></div>
    </section>

    <section class="offers">
        <h2 style="color: var(--fuchsia);">باقات تيتان الحصرية</h2>
        <div class="offer-row">
            <div class="offer-card"><img src="15.jpg"><p>باقة العروس</p></div>
            <div class="offer-card"><img src="16.jpg"><p>باقة التوفير</p></div>
            <div class="offer-card"><img src="17.jpg"><p>باقة النضارة</p></div>
            <div class="offer-card"><img src="18.jpg"><p>باقة الـ VIP</p></div>
        </div>
    </section>

    <footer>
        <p>تم صياغة الفخامة بواسطة <strong>CodeHub</strong> &copy; 2026</p>
    </footer>

    <script>
        // سكريبت القبل والبعد
        const slider = document.getElementById('ba-range');
        const beforeImg = document.getElementById('before-img');
        slider.addEventListener('input', (e) => {
            beforeImg.style.width = e.target.value + '%';
        });

        // ✨ سكريبت حركة الضوء السحري
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            glow.style.setProperty('--x', x + '%');
            glow.style.setProperty('--y', y + '%');
        });
    </script>
</body>
</html>
