<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>CODE HUB | THE VAULT</title>
    <style>
        body {
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden; perspective: 1000px; margin: 0;
        }

        /* حاوية الخزنة */
        .vault-container {
            width: 200px; height: 200px; position: relative;
            transform-style: preserve-3d; transition: transform 0.8s ease;
            cursor: pointer; animation: rotateVault 10s linear infinite;
        }

        .vault-container:hover { animation-play-state: paused; }

        /* وجوه الخزنة */
        .face {
            position: absolute; width: 200px; height: 200px;
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid #d4af37;
            box-shadow: inset 0 0 30px rgba(212, 175, 55, 0.5), 0 0 20px rgba(212, 175, 55, 0.2);
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; color: #d4af37; font-size: 1.2rem;
            backdrop-filter: blur(5px);
        }

        /* ترتيب الوجوه لعمل مكعب */
        .front  { transform: translateZ(100px); }
        .back   { transform: rotateY(180deg) translateZ(100px); }
        .left   { transform: rotateY(-90deg) translateZ(100px); }
        .right  { transform: rotateY(90deg) translateZ(100px); }
        .top    { transform: rotateX(90deg) translateZ(100px); }
        .bottom { transform: rotateX(-90deg) translateZ(100px); }

        /* الأنيميشن الخاص بالدوران */
        @keyframes rotateVault {
            from { transform: rotateX(0deg) rotateY(0deg); }
            to { transform: rotateX(360deg) rotateY(360deg); }
        }

        /* تأثير الانفجار عند الضغط (سيتم تطويره بالجافا سكريبت) */
        .vault-container.open .face {
            transform: translateZ(500px); opacity: 0; transition: 1s;
        }

        .reveal-text {
            position: absolute; font-size: 4rem; font-weight: 900;
            background: linear-gradient(to bottom, #f9e297, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0; transition: 2s; letter-spacing: 20px;
        }

        .reveal-text.active { opacity: 1; transform: scale(1.2); }

        /* ضوء خلفي */
        .light-glow {
            position: absolute; width: 10px; height: 10px;
            background: #d4af37; border-radius: 50%;
            box-shadow: 0 0 100px 50px rgba(212, 175, 55, 0.3);
            opacity: 0; transition: 1s;
        }
    </style>
</head>
<body>

    <div class="light-glow" id="glow"></div>
    <div class="reveal-text" id="text">CODE HUB</div>

    <div class="vault-container" id="vault" onclick="openVault()">
        <div class="face front">SECURED</div>
        <div class="face back">NO BACKDOOR</div>
        <div class="face left">LEGACY</div>
        <div class="face right">FUTURE</div>
        <div class="face top">VAULT</div>
        <div class="face bottom">CODE</div>
    </div>

    <script>
        function openVault() {
            const vault = document.getElementById('vault');
            const text = document.getElementById('text');
            const glow = document.getElementById('glow');

            vault.classList.add('open'); // انفجار الوجوه
            
            setTimeout(() => {
                text.classList.add('active'); // ظهور الكلمة الملكية
                glow.style.opacity = '1'; // انتشار الضوء
            }, 500);
        }
    </script>
</body>
</html>
