<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN JOY VIP | Luxury Experience</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #030303; color: #ffffff; overflow-x: hidden; }
        
        /* تأثير الضوء الخافت */
        #glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255, 0, 128, 0.1) 0%, transparent 40%);
            z-index: -1; pointer-events: none;
        }

        .titan-gradient-text {
            background: linear-gradient(90deg, #FF0080 0%, #FF8C00 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* تحديد أحجام الصور بدقة للفخامة */
        .img-container {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            aspect-ratio: 4/5; /* طول وعرض متناسق للموبايل */
        }
        
        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* سكرولر القبل والبعد بمقاس محكوم */
        .ba-wrapper {
            max-width: 380px; /* حجم محدد عشان ما يغطيش الشاشة */
            margin: 0 auto;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(255, 0, 128, 0.25);
        }
        
        .ba-container { position: relative; aspect-ratio: 1/1; overflow: hidden; touch-action: none; }
        .ba-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; }
        .ba-after { background-image: url('2.jpg'); }
        .ba-before { background-image: url('1.jpg'); width: 50%; border-right: 2px solid #FF8C00; z-index: 2; }
        .ba-slider { position: absolute; z-index: 10; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: col-resize; }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="antialiased">

    <div id="glow"></div>

    <nav class="fixed w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <span class="text-xl font-black tracking-tighter">TITAN<span class="titan-gradient-text">JOY</span></span>
            <span class="text-[10px] border border-pink-500/50 text-pink-500 px-2 py-1 rounded-full uppercase tracking-widest font-bold">CodeHub VIP</span>
        </div>
    </nav>

    <section class="pt-32 pb-16 px-6 text-center">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-4xl md:text-6xl font-black mb-6 leading-tight">بشرتِك تستحق <br><span class="titan-gradient-text">الرفاهية</span></h1>
            
            <div class="ba-wrapper my-10">
                <div class="ba-container">
                    <div class="ba-after ba-img"></div>
                    <div class="ba-before ba-img" id="before-img"></div>
                    <input type="range" min="0" max="100" value="50" class="ba-slider" id="ba-range">
                </div>
            </div>
            
            <a href="https://wa.me/201000000000" class="inline-block bg-white text-black px-10 py-4 rounded-full font-bold text-sm tracking-widest uppercase hover:bg-pink-500 hover:text-white transition-all duration-300">
                احجزي موعدكِ الآن
            </a>
        </div>
    </section>

    <section class="py-10 px-6 max-w-5xl mx-auto">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="space-y-2">
                <div class="img-container"><img src="11.jpg"></div>
                <p class="text-[10px] text-center font-bold tracking-widest text-gray-500">LASER CARE</p>
            </div>
            <div class="space-y-2 mt-6">
                <div class="img-container"><img src="12.jpg"></div>
                <p class="text-[10px] text-center font-bold tracking-widest text-gray-500">HYDRAFACIAL</p>
            </div>
            <div class="space-y-2">
                <div class="img-container"><img src="13.jpg"></div>
                <p class="text-[10px] text-center font-bold tracking-widest text-gray-500">SKIN GLOW</p>
            </div>
            <div class="space-y-2 mt-6">
                <div class="img-container"><img src="14.jpg"></div>
                <p class="text-[10px] text-center font-bold tracking-widest text-gray-500">FILLER & BOT</p>
            </div>
        </div>
    </section>

    <section class="py-20 px-4">
        <h2 class="text-center text-xs font-bold tracking-[0.3em] text-pink-500 mb-10 uppercase">Beauty Gallery</h2>
        <div class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="img-container"><img src="3.jpg"></div>
            <div class="img-container"><img src="4.jpg"></div>
            <div class="img-container"><img src="5.jpg"></div>
            <div class="img-container"><img src="6.jpg"></div>
            <div class="img-container"><img src="7.jpg"></div>
            <div class="img-container"><img src="8.jpg"></div>
            <div class="img-container"><img src="9.jpg"></div>
            <div class="img-container"><img src="10.jpg"></div>
        </div>
    </section>

    <section class="py-20 px-6 bg-white/[0.01]">
        <div class="max-w-5xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="glass-card rounded-3xl p-4 text-center">
                    <div class="img-container aspect-square mb-4 rounded-xl"><img src="15.jpg"></div>
                    <h4 class="text-xs font-bold mb-1">باقة العروس</h4>
                    <p class="text-pink-500 text-xs font-black">2500 LE</p>
                </div>
                <div class="glass-card rounded-3xl p-4 text-center">
                    <div class="img-container aspect-square mb-4 rounded-xl"><img src="16.jpg"></div>
                    <h4 class="text-xs font-bold mb-1">باقة النضارة</h4>
                    <p class="text-pink-500 text-xs font-black">999 LE</p>
                </div>
                <div class="glass-card rounded-3xl p-4 text-center">
                    <div class="img-container aspect-square mb-4 rounded-xl"><img src="17.jpg"></div>
                    <h4 class="text-xs font-bold mb-1">باقة الشباب</h4>
                    <p class="text-pink-500 text-xs font-black">1800 LE</p>
                </div>
                <div class="glass-card rounded-3xl p-4 text-center">
                    <div class="img-container aspect-square mb-4 rounded-xl"><img src="18.jpg"></div>
                    <h4 class="text-xs font-bold mb-1">باقة الـ VIP</h4>
                    <p class="text-pink-500 text-xs font-black">4000 LE</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center">
        <p class="text-[10px] tracking-widest text-gray-600 uppercase">Crafted by <span class="text-white">CodeHub</span> &copy; 2026</p>
    </footer>

    <script>
        const slider = document.getElementById('ba-range');
        const beforeImg = document.getElementById('before-img');
        slider.addEventListener('input', (e) => {
            beforeImg.style.width = e.target.value + '%';
        });

        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.setProperty('--x', (e.clientX / window.innerWidth * 100) + '%');
            glow.style.setProperty('--y', (e.clientY / window.innerHeight * 100) + '%');
        });
    </script>
</body>
</html>
