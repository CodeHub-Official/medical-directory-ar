<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN JOY VIP | عالم الجمال الحي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* CSS ------------------------------------------------ */
        :root {
            --fuchsia: #FF006E;
            --orange: #FFBE0B;
            --violet: #8338EC;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: white;
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* الماوس السحري (يظهر بوضوح على التابلت والكمبيوتر) */
        #magic-cursor {
            width: 20px; height: 20px;
            background: var(--fuchsia);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.15s ease-out;
            box-shadow: 0 0 15px var(--fuchsia);
        }

        /* الهيدر الزجاجي */
        .glass-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 2000;
            border-bottom: 1px solid var(--fuchsia);
        }

        .logo { font-size: 1.5rem; font-weight: 900; }
        .logo span { color: var(--fuchsia); }

        /* الهيرو سيكشن (النبض والروح) */
        .hero-section {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; padding: 60px 20px;
            min-height: 80vh;
        }

        .animate-title {
            font-size: 2.5rem; color: white;
            line-height: 1.3; margin-bottom: 20px;
        }
        .animate-title span { color: var(--orange); }

        .joy-button {
            background: linear-gradient(45deg, var(--fuchsia), var(--orange));
            border: none; padding: 15px 40px; color: white;
            font-size: 1.1rem; border-radius: 50px; cursor: pointer;
            font-weight: bold; animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 110, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 0, 110, 0); }
            100% { transform: scale(1); }
        }

        /* صور 3D */
        .hero-img-3d {
            margin-top: 40px; width: 90%; max-width: 600px;
            transform-style: preserve-3d; transition: 0.5s;
        }
        .hero-img-3d img {
            width: 100%; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(255, 0, 110, 0.3);
        }

        /* المعرض الحي */
        .gallery-section { padding: 50px 5%; }
        .title { text-align: center; color: var(--fuchsia); font-size: 2rem; margin-bottom: 30px; }
        
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .img-box {
            position: relative; border-radius: 15px; overflow: hidden;
            border: 1px solid #333; transition: 0.5s;
        }
        .img-box img { width: 100%; height: 300px; object-fit: cover; transition: 0.5s; }
        
        .img-box:hover img { transform: scale(1.1); filter: brightness(0.5); }

        .overlay-text {
            position: absolute; bottom: 20px; left: 20px;
            color: var(--orange); font-weight: bold; opacity: 0;
            transition: 0.5s; transform: translateY(20px);
        }
        .img-box:hover .overlay-text { opacity: 1; transform: translateY(0); }

        /* الفوتر */
        footer {
            background: #111; padding: 40px 20px; text-align: center;
            border-top: 1px solid var(--orange); margin-top: 50px;
        }
        .copy { font-size: 0.9rem; color: #888; }
        .copy strong { color: var(--orange); }

    </style>
</head>
<body>

    <div id="magic-cursor"></div>

    <nav class="glass-nav">
        <div class="logo">TITAN<span>JOY</span></div>
        <div style="font-size: 0.8rem; color: var(--orange);">VIP EXPERIENCE</div>
    </nav>

    <header class="hero-section">
        <h1 class="animate-title">بشرتكِ تتنفس <br><span>بالتكنولوجيا الملكية</span></h1>
        <p style="color: #ccc;">جمال مبهج، حركات سينمائية، ونتائج مبهرة</p>
        <button class="joy-button">احجزي موعدكِ الآن</button>

        <div class="hero-img-3d" id="tilt-card">
            <img src="https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?q=80&w=800" alt="Beauty">
        </div>
    </header>

    <section class="gallery-section">
        <h2 class="title">معرض الجمال الحي</h2>
        <div class="gallery-grid">
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?q=80&w=500" alt="Laser">
                <div class="overlay-text">ليزر كانديلا</div>
            </div>
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1522337660859-02fbefca4702?q=80&w=500" alt="Facial">
                <div class="overlay-text">هيدرافيشل برو</div>
            </div>
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1616394584738-fc6e612e71b9?q=80&w=500" alt="Skin">
                <div class="overlay-text">نضارة ماسية</div>
            </div>
        </div>
    </section>

    <footer>
        <div class="copy">
            تم بواسطة <strong>CodeHub</strong> &copy; 2026
        </div>
    </footer>

    <script>
        // JavaScript ------------------------------------------
        const cursor = document.getElementById('magic-cursor');
        
        // حركة الماوس
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // تأثير الـ Tilt (الميلان) للصور
        const card = document.getElementById('tilt-card');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 20;
            let y = (window.innerHeight / 2 - e.pageY) / 20;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        // تفاعل العناصر عند اللمس
        document.querySelectorAll('.joy-button, .img-box').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform = 'scale(3)';
                cursor.style.background = 'var(--orange)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = 'scale(1)';
                cursor.style.background = 'var(--fuchsia)';
            });
        });
    </script>
</body>
</html>
