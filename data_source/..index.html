<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Ahmed Sabbagh | Cinematic Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
--gold:#C6A55C;
--dark:#0c0c0c;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body{
font-family:'Inter',sans-serif;
background:#0c0c0c;
color:#fff;
overflow-x:hidden;
cursor:none;
}

body.ar{font-family:'Cairo',sans-serif}

/* Loader */
.loader{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
font-family:'Playfair Display';
font-size:40px;
color:var(--gold);
letter-spacing:3px;
animation:fadeOut 2s forwards 2s;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

/* Luxury Cursor */
.cursor{
position:fixed;
width:18px;height:18px;
border:2px solid var(--gold);
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
transition:.08s;
}

/* Floating Particles */
.particle{
position:fixed;
width:4px;height:4px;
background:var(--gold);
border-radius:50%;
opacity:.4;
animation:float 8s infinite linear;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* Sections */
section{
padding:150px 8%;
position:relative;
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
url("7.jpg") center/cover fixed no-repeat;
}

.hero h1{
font-size:clamp(50px,6vw,90px);
background:linear-gradient(90deg,#fff,var(--gold));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Reveal */
.reveal{
opacity:0;
transform:translateY(80px);
transition:1.2s cubic-bezier(.2,.8,.2,1);
}
.reveal.active{
opacity:1;
transform:translateY(0);
}

/* 3D Image */
.lux-img{
position:relative;
border-radius:25px;
overflow:hidden;
transition:transform .2s ease;
box-shadow:0 40px 100px rgba(0,0,0,.6);
}

.lux-img img{width:100%;display:block}

/* Gallery */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:50px;
margin-top:80px;
}

/* Modal */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
visibility:hidden;
transition:.4s;
z-index:10000;
}

.modal img{
max-width:85%;
max-height:85%;
border-radius:20px;
transform:scale(.8);
transition:.4s;
}

.modal.active{
opacity:1;
visibility:visible;
}

.modal.active img{
transform:scale(1);
}

</style>
</head>

<body>

<div class="loader">Elite Experience</div>
<div class="cursor"></div>

<script>
/* Floating Particles */
for(let i=0;i<25;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(p);
}
</script>

<section class="hero reveal">
<h1 data-en="Cinematic Precision"
data-ar="دقة سينمائية">
Cinematic Precision
</h1>
</section>

<section class="reveal">
<h2 data-en="Elite Gallery" data-ar="معرض النخبة">
Elite Gallery
</h2>

<div class="gallery">
<div class="lux-img"><img src="1.jpg"></div>
<div class="lux-img"><img src="2.jpg"></div>
<div class="lux-img"><img src="3.jpg"></div>
<div class="lux-img"><img src="4.jpg"></div>
</div>
</section>

<div class="modal" id="modal">
<img src="">
</div>

<script>

/* Cursor */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* 3D Tilt */
document.querySelectorAll(".lux-img").forEach(card=>{
card.addEventListener("mousemove",e=>{
let rect=card.getBoundingClientRect();
let x=(e.clientX-rect.left)/rect.width-0.5;
let y=(e.clientY-rect.top)/rect.height-0.5;
card.style.transform=`rotateY(${x*15}deg) rotateX(${-y*15}deg)`;
});
card.addEventListener("mouseleave",()=>{
card.style.transform="rotateY(0) rotateX(0)";
});
});

/* Reveal */
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("active");
}
});
});
document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

/* Modal */
const modal=document.getElementById("modal");
const modalImg=modal.querySelector("img");

document.querySelectorAll(".lux-img img").forEach(img=>{
img.addEventListener("click",()=>{
modal.classList.add("active");
modalImg.src=img.src;
});
});

modal.addEventListener("click",()=>{
modal.classList.remove("active");
});

/* Translation */
function toggleLang(){
const html=document.documentElement;
const isEnglish=html.lang==="en";
const newLang=isEnglish?"ar":"en";

html.lang=newLang;
html.dir=isEnglish?"rtl":"ltr";
document.body.classList.toggle("ar");

document.querySelectorAll("[data-en]").forEach(el=>{
el.innerText=newLang==="ar"?el.dataset.ar:el.dataset.en;
});

localStorage.setItem("siteLang",newLang);
}

window.addEventListener("DOMContentLoaded",()=>{
const saved=localStorage.getItem("siteLang");
if(saved==="ar")toggleLang();
});
</script>

</body>
</html>
