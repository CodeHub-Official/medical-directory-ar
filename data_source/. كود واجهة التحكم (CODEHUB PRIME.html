<style>

    .box:hover { transform: scale(1.1); border-color: #fff; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
    .dot { width: 45px; height: 45px; border-radius: 50%; margin-bottom: 15px; box-shadow: 0 0 25px currentColor; }
