<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <title>CODE HUB | الإشراقة العقارية</title>
    <style>
        /* خلفية حية ومبهجة */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1a2a6c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white; font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden; min-height: 100vh;
        }

        /* هيدر شفاف 3D */
        header {
            position: fixed; top: 0; width: 100%; padding: 15px 5%;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000; border-bottom: 1px solid rgba(212,175,55,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .brand-logo { font-size: 1.8rem; font-weight: 900; color: #f9e297; text-shadow: 0 0 15px rgba(249,226,151,0.5); }

        /* القائمة الجانبية (3 شرط) */
        .menu-btn {
            font-size: 1.5rem; color: #f9e297; cursor: pointer; transition: 0.3s;
        }
        .side-menu {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
            background: rgba(13, 37, 70, 0.8); backdrop-filter: blur(25px);
            transition: 0.5s; z-index: 3000; padding: 100px 30px;
            border-left: 1px solid rgba(212,175,55,0.3);
        }
        .side-menu.active { right: 0; }
        .side-menu a {
            display: block; color: white; text-decoration: none;
            font-size: 1.5rem; margin-bottom: 30px; transition: 0.3s;
            border-bottom: 1px solid rgba(212,175,55,0.1); padding-bottom: 10px;
        }
        .side-menu a:hover { color: #f9e297; padding-right: 15px; }

        /* زر اللغة */
        .lang-switch {
            background: rgba(249, 226, 151, 0.2); color: #f9e297;
            border: 1px solid #f9e297; padding: 8px 20px; border-radius: 50px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .lang-switch:hover { background: #f9e297; color: #050a18; }

        /* منطقة العنوان السحرية */
        .hero-title-area {
            margin-top: 120px; padding: 100px 20px; text-align: center;
            transition: opacity 0.8s ease;
        }
        .hero-title-area:hover { opacity: 0; } /* يختفي مع حركة الماوس */

        .main-title {
            font-size: clamp(3rem, 10vw, 7rem); font-weight: 900;
            background: linear-gradient(to bottom, #f9e297, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 15px; filter: drop-shadow(0 0 20px rgba(212,175,55,0.4));
        }

        /* حاوي المشاريع السنتر */
        .container { 
            width: 100%; max-width: 1100px; margin: 0 auto; padding: 40px 20px; 
        }

        .card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 30px; margin-bottom: 60px;
            display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px); transition: 0.5s;
        }
        .card:hover { transform: translateY(-15px) scale(1.02); background: rgba(255,255,255,0.1); }

        .img-box img { width: 100%; height: 350px; object-fit: cover; border-radius: 20px; }

        @media (max-width: 900px) { .card { grid-template-columns: 1fr !important; } }
    </style>
</head>
<body>

    <div class="side-menu" id="sideMenu">
        <div style="position:absolute; top:30px; left:30px; cursor:pointer; font-size:2rem;" onclick="toggleMenu()">×</div>
        <a href="#">الصفحة الرئيسية</a>
        <a href="#">أعمالنا</a>
        <a href="#">من نحن</a>
        <a href="#">اتصل بنا</a>
    </div>

    <header>
        <div class="brand-logo">CODE HUB</div>
        <div class="header-left">
            <button class="lang-switch" onclick="toggleLanguage()" id="langBtn">English</button>
            <div class="menu-btn" onclick="toggleMenu()">☰</div>
        </div>
    </header>

    <div class="hero-title-area">
        <h1 class="main-title">CODE HUB</h1>
        <p style="color: #f9e297; font-size: 1.5rem; letter-spacing: 5px;">ARCHITECTURE & BEYOND</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="img-box"><img src="1.jpg" alt="Estate"></div>
            <div style="display:flex; flex-direction:column; justify-content:center; text-align:right;">
                <h2 style="font-size:2.5rem; color:#f9e297;">الماسة الزرقاء</h2>
                <div style="color:#d4af37; font-size:2rem; font-weight:bold; margin:15px 0;">$4,500,000</div>
                <p>وصف المشروع الإبداعي يظهر هنا بوضوح تام.</p>
            </div>
        </div>
        </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        function toggleLanguage() {
            const html = document.getElementById('mainHtml');
            const btn = document.getElementById('langBtn');
            if (html.dir === 'rtl') {
                html.dir = 'ltr'; btn.innerText = 'العربية';
            } else {
                html.dir = 'rtl'; btn.innerText = 'English';
            }
        }
    </script>
</body>
</html>
